<!DOCTYPE html>
<html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Tarik Data PM</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',Tahoma,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}.c{background:#fff;border-radius:15px;box-shadow:0 10px 40px rgba(0,0,0,.3);width:100%;max-width:520px;padding:40px;text-align:center}.i{font-size:50px;margin-bottom:15px}h1{color:#333;font-size:26px;margin-bottom:8px}.s{color:#666;font-size:14px;margin-bottom:28px}.b{background:#f0f4ff;border-left:4px solid #667eea;padding:14px;margin-bottom:24px;border-radius:5px;font-size:13px;color:#555;line-height:1.6;text-align:left}button{width:100%;padding:16px;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}button:disabled{opacity:.6;cursor:not-allowed}.st{margin-top:22px;padding:15px;border-radius:5px;display:none;font-size:13px;line-height:1.6;text-align:left}.info{background:#e3f2fd;color:#1565c0;border-left:4px solid #1976d2}.ok{background:#e8f5e9;color:#2e7d32;border-left:4px solid #4caf50}.err{background:#ffebee;color:#c62828;border-left:4px solid #f44336}.f{margin-top:26px;font-size:11px;color:#aaa}</style></head>
<body><div class="c"><div class="i">📊</div><h1>Tarik Data PM</h1><div class="s">Laporan Preventive Maintenance — Area Bali &amp; NUSRA</div>
<div class="b">Klik tombol di bawah untuk mengunduh laporan PM terbaru (bulan berjalan) dalam Excel berwarna, sudah ter-sorting per persentase.</div>
<button id="btn">📥 Tarik Data</button><div class="st" id="st"></div><div class="f">Token dikelola secara aman oleh admin.</div></div>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script>
var btn=document.getElementById('btn'),st=document.getElementById('st');
function show(m,t){st.innerHTML=m;st.className='st '+t;st.style.display='block';}
btn.onclick=async function(){
btn.disabled=true;show('⏳ Mengambil data dari MENTOR... mohon tunggu (10-30 detik)...','info');
try{
var res=await fetch('/.netlify/functions/tarik-data');var p=await res.json();
if(!res.ok||p.error){show('❌ '+(p.error||('Gagal (kode '+res.status+')')),'err');btn.disabled=false;return;}
show('⏳ Membuat Excel berwarna...','info');build(p.bali||[],p.nusra||[]);
var bt=(p.bali||[]).reduce((s,r)=>s+r.total,0),bd=(p.bali||[]).reduce((s,r)=>s+r.done,0);
var nt=(p.nusra||[]).reduce((s,r)=>s+r.total,0),nd=(p.nusra||[]).reduce((s,r)=>s+r.done,0);
show('✅ Berhasil!<br>📍 BALI: '+(p.bali||[]).length+' teknisi | '+bd+'/'+bt+' PM Done<br>📍 NUSRA: '+(p.nusra||[]).length+' teknisi | '+nd+'/'+nt+' PM Done<br><br>File Excel sudah terunduh ke folder Downloads.','ok');
}catch(e){show('❌ Error: '+e.message,'err');}
btn.disabled=false;};
function build(bali,nusra){
if(!window.XLSX)throw new Error('Library Excel belum termuat (cek internet)');
var col=p=>p===100?'FFFFFF':p>=75?'92D050':p>=35?'FFFF00':'FF0000';
var B={style:'thin',color:{rgb:'BFBFBF'}},bd={top:B,bottom:B,left:B,right:B};
var ts={font:{bold:true,sz:14,color:{rgb:'1F3864'},name:'Arial'}};
var hs={fill:{patternType:'solid',fgColor:{rgb:'4472C4'}},font:{bold:true,sz:10,color:{rgb:'FFFFFF'},name:'Arial'},alignment:{horizontal:'center',vertical:'center',wrapText:true},border:bd};
var ds=(c,k)=>({fill:{patternType:'solid',fgColor:{rgb:c}},font:{sz:10,name:'Arial'},alignment:{horizontal:k===1?'left':'center',vertical:'center'},border:bd});
var os=(c,k)=>({fill:{patternType:'solid',fgColor:{rgb:c}},font:{bold:true,sz:10,name:'Arial'},alignment:{horizontal:k===1?'left':'center',vertical:'center'},border:bd});
var aoa=[],ops=[],rh=[],H=['No','Nama MERi','PM On Progress','PM Pending','PM Done Total','PM Done Hari Ini','Total PM','% Done'];
function sec(title,data,area){var r=aoa.length;aoa.push([title]);ops.push({r:r,c:0,s:ts});rh[r]=22;aoa.push([]);
r=aoa.length;aoa.push(H.slice());H.forEach((_,c)=>ops.push({r:r,c:c,s:hs}));rh[r]=30;
for(var it of data){r=aoa.length;var cc=col(it.pctDone);aoa.push([it.no,it.teknisi,it.onProgress,it.pending,it.done,it.doneToday,it.total,it.pctDone+'%']);for(var c=0;c<8;c++)ops.push({r:r,c:c,s:ds(cc,c)});}
var t={onProgress:0,pending:0,done:0,doneToday:0,total:0};
data.forEach(d=>{t.onProgress+=d.onProgress;t.pending+=d.pending;t.done+=d.done;t.doneToday+=d.doneToday;t.total+=d.total;});
var pct=t.total>0?Math.round(t.done/t.total*100):0;
r=aoa.length;aoa.push(['','TOTAL '+area,t.onProgress,t.pending,t.done,t.doneToday,t.total,pct+'%']);for(var c=0;c<8;c++)ops.push({r:r,c:c,s:os('92D050',c)});aoa.push([]);return t;}
var bt=sec('Area Bali - Laporan PM',bali,'BALI'),nt=sec('Area NUSRA - Laporan PM',nusra,'NUSRA');
var g={onProgress:bt.onProgress+nt.onProgress,pending:bt.pending+nt.pending,done:bt.done+nt.done,doneToday:bt.doneToday+nt.doneToday,total:bt.total+nt.total};
var gp=g.total>0?Math.round(g.done/g.total*100):0;
var r=aoa.length;aoa.push(['','TOTAL KESELURUHAN',g.onProgress,g.pending,g.done,g.doneToday,g.total,gp+'%']);for(var c=0;c<8;c++)ops.push({r:r,c:c,s:os('A9D08E',c)});
var ws=XLSX.utils.aoa_to_sheet(aoa);
ops.forEach(o=>{var a=XLSX.utils.encode_cell({r:o.r,c:o.c});if(!ws[a])ws[a]={t:'s',v:''};ws[a].s=o.s;});
ws['!cols']=[{wch:6},{wch:34},{wch:16},{wch:12},{wch:14},{wch:16},{wch:11},{wch:10}];
ws['!rows']=rh.map(h=>h?{hpt:h}:{});
var wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Laporan PM');
XLSX.writeFile(wb,'Laporan_PM_'+new Date().toISOString().split('T')[0]+'.xlsx');}
</script></body></html>
